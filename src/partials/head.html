<!-- Head Partial - GameGuidePro -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- SEO Meta -->
<title>{{PAGE_TITLE}} | GameGuidePro</title>
<meta name="description" content="{{PAGE_DESCRIPTION}}">
<meta name="keywords" content="{{PAGE_KEYWORDS}}">
<meta name="author" content="GameGuidePro Team">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{CANONICAL_URL}}">

<!-- Open Graph -->
<meta property="og:title" content="{{PAGE_TITLE}} | GameGuidePro">
<meta property="og:description" content="{{PAGE_DESCRIPTION}}">
<meta property="og:type" content="{{OG_TYPE}}">
<meta property="og:url" content="{{CANONICAL_URL}}">
<meta property="og:site_name" content="GameGuidePro">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:locale" content="en_US">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{PAGE_TITLE}} | GameGuidePro">
<meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
<meta name="twitter:image" content="{{OG_IMAGE}}">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- CSS -->
<link rel="stylesheet" href="/css/style.css">

<!-- Structured Data (replace per page) -->
<script type="application/ld+json">{{JSONLD}}</script>

<!-- robots.txt & sitemap reference -->
<meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large">
